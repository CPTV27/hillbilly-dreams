buildConfig:
  buildMachine: N1_HIGHMEM_32

runConfig:
  runtime: nodejs20
  maxInstances: 10
  memoryMiB: 8192
  cpu: 4

env:
  - variable: NODE_ENV
    value: production
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=8192"
  # All secrets via Firebase Secret Manager — never inline values here
  - variable: DATABASE_URL
    secret: DATABASE_URL
  - variable: DIRECT_DATABASE_URL
    secret: DIRECT_DATABASE_URL
  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET
  - variable: ADMIN_SESSION_TOKEN
    secret: ADMIN_SESSION_TOKEN
  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID
  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET
  - variable: NEXTAUTH_URL
    secret: NEXTAUTH_URL
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
  - variable: PERPLEXITY_API_KEY
    secret: PERPLEXITY_API_KEY
