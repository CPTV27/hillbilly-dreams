<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Canvas — Big Muddy OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    user-select: none;
  }
  body.dragging { cursor: grabbing; }
  body.node-dragging { cursor: grabbing; }

  #canvas-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  #world {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* Dot grid */
  #dot-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Map layer */
  #map-layer {
    position: absolute;
    width: 800px;
    height: 600px;
    left: -400px;
    top: -300px;
    border-radius: 16px;
    overflow: hidden;
    opacity: 0.6;
    border: 2px solid rgba(59, 130, 246, 0.3);
    z-index: 1;
    display: none;
  }
  #map-layer.visible { display: block; }
  #map-layer iframe {
    width: 100%;
    height: 100%;
    border: none;
    filter: saturate(0.3) brightness(0.7);
    pointer-events: none;
  }

  /* SVG connection layer */
  #connections-svg {
    position: absolute;
    left: -10000px;
    top: -10000px;
    width: 20000px;
    height: 20000px;
    pointer-events: none;
    z-index: 2;
  }

  /* Nodes */
  .canvas-node {
    position: absolute;
    border-radius: 16px;
    padding: 20px;
    min-width: 220px;
    cursor: grab;
    z-index: 10;
    transition: box-shadow 0.2s;
    backdrop-filter: blur(12px);
  }
  .canvas-node:hover { z-index: 20; }
  .canvas-node.dragging { cursor: grabbing; z-index: 100; }

  .node-project {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(6, 78, 59, 0.25));
    border: 1.5px solid rgba(16, 185, 129, 0.4);
    box-shadow: 0 4px 24px rgba(16, 185, 129, 0.1);
  }
  .node-project:hover { box-shadow: 0 8px 32px rgba(16, 185, 129, 0.25); }

  .node-deal {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(30, 58, 138, 0.25));
    border: 1.5px solid rgba(59, 130, 246, 0.4);
    box-shadow: 0 4px 24px rgba(59, 130, 246, 0.1);
  }
  .node-deal:hover { box-shadow: 0 8px 32px rgba(59, 130, 246, 0.25); }

  .node-milestone {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(120, 53, 15, 0.25));
    border: 1.5px solid rgba(245, 158, 11, 0.4);
    box-shadow: 0 4px 24px rgba(245, 158, 11, 0.1);
    min-width: 180px;
  }
  .node-milestone:hover { box-shadow: 0 8px 32px rgba(245, 158, 11, 0.25); }

  .node-strategy {
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(76, 29, 149, 0.25));
    border: 1.5px solid rgba(139, 92, 246, 0.4);
    box-shadow: 0 4px 24px rgba(139, 92, 246, 0.1);
    min-width: 280px;
  }
  .node-strategy:hover { box-shadow: 0 8px 32px rgba(139, 92, 246, 0.25); }

  .node-floorplan {
    background: rgba(30, 41, 59, 0.8);
    border: 1.5px solid rgba(100, 116, 139, 0.4);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    min-width: 320px;
    padding: 12px;
  }
  .node-floorplan:hover { box-shadow: 0 8px 32px rgba(100, 116, 139, 0.3); }

  .node-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .node-sublabel {
    font-size: 11px;
    opacity: 0.6;
    font-family: 'SF Mono', 'Fira Code', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .node-value {
    font-size: 20px;
    font-weight: 700;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }
  .node-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Floor plan placeholder */
  .floorplan-img {
    width: 100%;
    height: 200px;
    border-radius: 8px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 19px,
      rgba(100, 116, 139, 0.15) 19px,
      rgba(100, 116, 139, 0.15) 20px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 19px,
      rgba(100, 116, 139, 0.15) 19px,
      rgba(100, 116, 139, 0.15) 20px
    );
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(148, 163, 184, 0.5);
    font-size: 12px;
    font-family: monospace;
    border: 1px dashed rgba(100, 116, 139, 0.3);
    position: relative;
    overflow: hidden;
  }
  .floorplan-img svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.25;
  }

  /* Connection anchor */
  .node-anchor {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.6);
    position: absolute;
    cursor: crosshair;
    z-index: 30;
    transition: transform 0.15s, background 0.15s;
  }
  .node-anchor:hover {
    transform: scale(1.4);
    background: rgba(59, 130, 246, 0.8);
  }
  .anchor-right { right: -6px; top: 50%; transform: translateY(-50%); }
  .anchor-left { left: -6px; top: 50%; transform: translateY(-50%); }
  .anchor-right:hover { transform: translateY(-50%) scale(1.4); }
  .anchor-left:hover { transform: translateY(-50%) scale(1.4); }

  /* Toolbar */
  #toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 6px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 14px;
    padding: 8px 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .toolbar-btn {
    background: transparent;
    border: 1px solid transparent;
    color: #94a3b8;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    font-weight: 500;
    white-space: nowrap;
  }
  .toolbar-btn:hover {
    background: rgba(51, 65, 85, 0.5);
    color: #e2e8f0;
    border-color: rgba(71, 85, 105, 0.5);
  }
  .toolbar-btn.active {
    background: rgba(59, 130, 246, 0.2);
    color: #60a5fa;
    border-color: rgba(59, 130, 246, 0.4);
  }
  .toolbar-divider {
    width: 1px;
    background: rgba(51, 65, 85, 0.6);
    margin: 4px 4px;
  }

  /* Minimap */
  #minimap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 12px;
    z-index: 1000;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }
  #minimap-canvas {
    width: 100%;
    height: 100%;
  }
  #minimap-viewport {
    position: absolute;
    border: 1.5px solid rgba(59, 130, 246, 0.6);
    background: rgba(59, 130, 246, 0.08);
    border-radius: 3px;
    pointer-events: none;
  }

  /* Zoom indicator */
  #zoom-indicator {
    position: fixed;
    bottom: 24px;
    left: 20px;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: monospace;
    color: #64748b;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .zoom-btn {
    background: rgba(51, 65, 85, 0.4);
    border: 1px solid rgba(71, 85, 105, 0.4);
    color: #94a3b8;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  .zoom-btn:hover { background: rgba(71, 85, 105, 0.6); color: #e2e8f0; }

  /* Brand stamp */
  #brand {
    position: fixed;
    top: 16px;
    left: 20px;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #brand-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    color: white;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
  }
  #brand-text {
    display: flex;
    flex-direction: column;
  }
  #brand-text .name {
    font-size: 14px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.02em;
  }
  #brand-text .sub {
    font-size: 10px;
    color: #64748b;
    font-family: monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Coord readout */
  #coords {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 1000;
    font-size: 11px;
    font-family: monospace;
    color: #475569;
    background: rgba(15, 23, 42, 0.7);
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid rgba(51, 65, 85, 0.4);
  }

  /* Connection drawing preview */
  #connection-preview {
    position: absolute;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<div id="brand">
  <div id="brand-logo">BM</div>
  <div id="brand-text">
    <span class="name">Big Muddy</span>
    <span class="sub">Spatial Canvas</span>
  </div>
</div>

<div id="coords">0, 0</div>

<div id="toolbar">
  <button class="toolbar-btn" onclick="resetView()" title="Reset view">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" id="btn-map" onclick="toggleMap()" title="Toggle map layer">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    Map
  </button>
  <button class="toolbar-btn" id="btn-grid" onclick="toggleGrid()" title="Toggle dot grid">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="4" cy="4" r="1.5" fill="currentColor"/><circle cx="12" cy="4" r="1.5" fill="currentColor"/><circle cx="20" cy="4" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="20" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="20" r="1.5" fill="currentColor"/><circle cx="12" cy="20" r="1.5" fill="currentColor"/><circle cx="20" cy="20" r="1.5" fill="currentColor"/></svg>
    Grid
  </button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" onclick="addNode('project')" title="Add project node">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Project
  </button>
  <button class="toolbar-btn" onclick="addNode('deal')" title="Add deal node">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>
    Deal
  </button>
  <button class="toolbar-btn" onclick="addNode('milestone')" title="Add milestone node">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Milestone
  </button>
  <button class="toolbar-btn" onclick="addNode('floorplan')" title="Add floor plan">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="10" y1="2" x2="10" y2="22"/></svg>
    Floor Plan
  </button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" onclick="autoLayout()" title="Auto-arrange nodes">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Auto-Layout
  </button>
</div>

<div id="canvas-container">
  <canvas id="dot-grid"></canvas>
  <div id="world">
    <div id="map-layer">
      <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-91.5,33.5,-90.5,34.5&layer=mapnik" loading="lazy"></iframe>
    </div>
    <svg id="connections-svg">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="rgba(148, 163, 184, 0.5)"/>
        </marker>
      </defs>
    </svg>
  </div>
</div>

<div id="minimap">
  <canvas id="minimap-canvas"></canvas>
  <div id="minimap-viewport"></div>
</div>

<div id="zoom-indicator">
  <button class="zoom-btn" onclick="zoomBy(-0.15)">−</button>
  <span id="zoom-level">100%</span>
  <button class="zoom-btn" onclick="zoomBy(0.15)">+</button>
</div>

<script>
// ─── STATE ───
let panX = 0, panY = 0, zoom = 1;
let isPanning = false, panStartX = 0, panStartY = 0;
let gridVisible = true, mapVisible = false;
let nodeIdCounter = 0;
let nodes = [];
let connections = [];
let draggingNode = null, dragOffsetX = 0, dragOffsetY = 0;
let connectingFrom = null;

const world = document.getElementById('world');
const gridCanvas = document.getElementById('dot-grid');
const gridCtx = gridCanvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');
const coordsEl = document.getElementById('coords');
const zoomEl = document.getElementById('zoom-level');
const connectionsSvg = document.getElementById('connections-svg');

// ─── SEED DATA ───
const seedNodes = [
  { type: 'strategy', x: 0, y: -200, label: 'Big Muddy Media Platform', sub: 'STRATEGIC INITIATIVE', value: null, badge: 'ACTIVE', badgeColor: '#8b5cf6' },
  { type: 'project', x: -450, y: 100, label: 'S2PX Operations Center', sub: 'PRODUCTION', value: null, badge: 'IN BUILD', badgeColor: '#10b981' },
  { type: 'project', x: -100, y: 100, label: 'Big Muddy Inn', sub: 'HOSPITALITY', value: null, badge: 'ACTIVE', badgeColor: '#10b981' },
  { type: 'project', x: 250, y: 100, label: 'Snowbird Circuit', sub: 'TOURING', value: null, badge: 'PLANNING', badgeColor: '#f59e0b' },
  { type: 'deal', x: -500, y: 360, label: 'Scan2Plan Enterprise', sub: 'PIPELINE', value: '$185,000', badge: 'PROPOSAL', badgeColor: '#3b82f6' },
  { type: 'deal', x: -150, y: 360, label: 'Brand Client — Delta Co-op', sub: 'PIPELINE', value: '$42,000', badge: 'QUALIFIED', badgeColor: '#3b82f6' },
  { type: 'deal', x: 200, y: 360, label: 'Venue Network Partnership', sub: 'PIPELINE', value: '$95,000', badge: 'IN HAND', badgeColor: '#10b981' },
  { type: 'milestone', x: -300, y: 560, label: 'Q2 Revenue Target', sub: 'MILESTONE', value: '$760K', badge: 'ON TRACK', badgeColor: '#f59e0b' },
  { type: 'milestone', x: 100, y: 560, label: 'Multi-Tenant Launch', sub: 'MILESTONE', value: 'June 2026', badge: 'PLANNED', badgeColor: '#94a3b8' },
  { type: 'floorplan', x: 550, y: -100, label: 'Big Muddy Inn — Ground Floor', sub: 'ARCHITECTURAL' },
];

const seedConnections = [
  [0, 1], [0, 2], [0, 3],
  [1, 4], [2, 5], [3, 6],
  [4, 7], [5, 7], [6, 8],
];

// ─── INIT ───
function init() {
  resizeGrid();

  // Center the view
  panX = window.innerWidth / 2;
  panY = window.innerHeight / 3;

  // Create seed nodes
  seedNodes.forEach(n => createNode(n.type, n.x, n.y, n.label, n.sub, n.value, n.badge, n.badgeColor));

  // Create seed connections
  seedConnections.forEach(([from, to]) => {
    connections.push({ from: nodes[from].id, to: nodes[to].id });
  });

  updateTransform();
  drawGrid();
  renderConnections();
  updateMinimap();
}

function resizeGrid() {
  gridCanvas.width = window.innerWidth;
  gridCanvas.height = window.innerHeight;
  minimapCanvas.width = 200;
  minimapCanvas.height = 150;
}

// ─── NODES ───
function createNode(type, x, y, label, sub, value, badge, badgeColor) {
  const id = 'node-' + (nodeIdCounter++);
  const el = document.createElement('div');
  el.className = `canvas-node node-${type}`;
  el.id = id;
  el.style.left = x + 'px';
  el.style.top = y + 'px';

  let inner = '';

  if (type === 'floorplan') {
    inner = `
      <div class="node-sublabel" style="margin-bottom:8px;">${sub || 'FLOOR PLAN'}</div>
      <div class="floorplan-img">
        <svg viewBox="0 0 320 200">
          <!-- Simple architectural floor plan sketch -->
          <rect x="20" y="20" width="280" height="160" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="2"/>
          <line x1="20" y1="90" x2="160" y2="90" stroke="rgba(148,163,184,0.25)" stroke-width="1.5"/>
          <line x1="160" y1="20" x2="160" y2="180" stroke="rgba(148,163,184,0.25)" stroke-width="1.5"/>
          <line x1="160" y1="120" x2="300" y2="120" stroke="rgba(148,163,184,0.25)" stroke-width="1.5"/>
          <rect x="40" y="30" width="50" height="50" fill="none" stroke="rgba(100,116,139,0.2)" stroke-dasharray="4"/>
          <rect x="180" y="30" width="40" height="40" fill="none" stroke="rgba(100,116,139,0.2)" stroke-dasharray="4"/>
          <rect x="240" y="130" width="40" height="35" fill="none" stroke="rgba(100,116,139,0.2)" stroke-dasharray="4"/>
          <!-- Door arcs -->
          <path d="M 120 90 A 20 20 0 0 1 140 90" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
          <path d="M 160 60 A 15 15 0 0 1 160 75" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
          <!-- Room labels -->
          <text x="55" y="58" fill="rgba(148,163,184,0.3)" font-size="8" font-family="monospace" text-anchor="middle">LOBBY</text>
          <text x="80" y="140" fill="rgba(148,163,184,0.3)" font-size="8" font-family="monospace" text-anchor="middle">STAGE</text>
          <text x="200" y="55" fill="rgba(148,163,184,0.3)" font-size="8" font-family="monospace" text-anchor="middle">BAR</text>
          <text x="230" y="155" fill="rgba(148,163,184,0.3)" font-size="8" font-family="monospace" text-anchor="middle">KITCHEN</text>
        </svg>
      </div>
      <div class="node-label" style="margin-top:8px;">${label}</div>
    `;
  } else {
    inner = `
      <div class="node-sublabel">${sub || type.toUpperCase()}</div>
      <div class="node-label">${label}</div>
      ${value ? `<div class="node-value">${value}</div>` : ''}
      ${badge ? `<span class="node-badge" style="background:${badgeColor}22;color:${badgeColor};border:1px solid ${badgeColor}44">${badge}</span>` : ''}
    `;
  }

  // Add connection anchors
  inner += `
    <div class="node-anchor anchor-left" data-node="${id}" data-side="left"></div>
    <div class="node-anchor anchor-right" data-node="${id}" data-side="right"></div>
  `;

  el.innerHTML = inner;
  world.appendChild(el);

  const nodeData = { id, type, x, y, el, label };
  nodes.push(nodeData);

  // Node drag
  el.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('node-anchor')) return;
    e.stopPropagation();
    draggingNode = nodeData;
    dragOffsetX = (e.clientX - panX) / zoom - nodeData.x;
    dragOffsetY = (e.clientY - panY) / zoom - nodeData.y;
    el.classList.add('dragging');
    document.body.classList.add('node-dragging');
  });

  // Anchor events for connections
  el.querySelectorAll('.node-anchor').forEach(anchor => {
    anchor.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      connectingFrom = { nodeId: id, side: anchor.dataset.side };
    });
    anchor.addEventListener('mouseup', (e) => {
      e.stopPropagation();
      if (connectingFrom && connectingFrom.nodeId !== id) {
        connections.push({ from: connectingFrom.nodeId, to: id });
        renderConnections();
        updateMinimap();
      }
      connectingFrom = null;
    });
  });

  return nodeData;
}

function addNode(type) {
  const cx = (window.innerWidth / 2 - panX) / zoom;
  const cy = (window.innerHeight / 2 - panY) / zoom;
  const labels = {
    project: 'New Project',
    deal: 'New Deal',
    milestone: 'New Milestone',
    strategy: 'New Strategy',
    floorplan: 'Floor Plan',
  };
  const subs = {
    project: 'PROJECT',
    deal: 'PIPELINE',
    milestone: 'MILESTONE',
    strategy: 'STRATEGIC INITIATIVE',
    floorplan: 'ARCHITECTURAL',
  };
  const colors = {
    project: '#10b981',
    deal: '#3b82f6',
    milestone: '#f59e0b',
    strategy: '#8b5cf6',
    floorplan: '#64748b',
  };
  createNode(type, cx + (Math.random() - 0.5) * 40, cy + (Math.random() - 0.5) * 40,
    labels[type], subs[type], type === 'deal' ? '$0' : null, 'NEW', colors[type]);
  updateMinimap();
}

// ─── CONNECTIONS ───
function renderConnections() {
  const paths = connectionsSvg.querySelectorAll('path.conn');
  paths.forEach(p => p.remove());

  connections.forEach(conn => {
    const fromNode = nodes.find(n => n.id === conn.from);
    const toNode = nodes.find(n => n.id === conn.to);
    if (!fromNode || !toNode) return;

    const fromRect = fromNode.el.getBoundingClientRect();
    const toRect = toNode.el.getBoundingClientRect();

    // Use world coords
    const fx = fromNode.x + fromNode.el.offsetWidth;
    const fy = fromNode.y + fromNode.el.offsetHeight / 2;
    const tx = toNode.x;
    const ty = toNode.y + toNode.el.offsetHeight / 2;

    const dx = Math.abs(tx - fx) * 0.5;
    const d = `M ${fx + 10000} ${fy + 10000} C ${fx + dx + 10000} ${fy + 10000}, ${tx - dx + 10000} ${ty + 10000}, ${tx + 10000} ${ty + 10000}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'conn');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', 'rgba(148, 163, 184, 0.25)');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-dasharray', '6 4');
    path.setAttribute('marker-end', 'url(#arrowhead)');
    connectionsSvg.appendChild(path);
  });
}

// ─── TRANSFORM ───
function updateTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  zoomEl.textContent = Math.round(zoom * 100) + '%';
  drawGrid();
  renderConnections();
  updateMinimap();
}

// ─── DOT GRID ───
function drawGrid() {
  const w = gridCanvas.width;
  const h = gridCanvas.height;
  gridCtx.clearRect(0, 0, w, h);

  if (!gridVisible) return;

  const spacing = 40 * zoom;
  if (spacing < 8) return; // too zoomed out

  const offsetX = panX % spacing;
  const offsetY = panY % spacing;

  gridCtx.fillStyle = `rgba(51, 65, 85, ${Math.min(0.6, zoom * 0.4)})`;

  for (let x = offsetX; x < w; x += spacing) {
    for (let y = offsetY; y < h; y += spacing) {
      gridCtx.beginPath();
      gridCtx.arc(x, y, 1.2 * zoom, 0, Math.PI * 2);
      gridCtx.fill();
    }
  }
}

// ─── MINIMAP ───
function updateMinimap() {
  const mw = 200, mh = 150;
  minimapCtx.clearRect(0, 0, mw, mh);

  if (nodes.length === 0) return;

  // Find bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + 250);
    maxY = Math.max(maxY, n.y + 120);
  });

  const padding = 200;
  minX -= padding; minY -= padding; maxX += padding; maxY += padding;
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const scale = Math.min(mw / rangeX, mh / rangeY);
  const ox = (mw - rangeX * scale) / 2;
  const oy = (mh - rangeY * scale) / 2;

  // Draw connections
  minimapCtx.strokeStyle = 'rgba(100, 116, 139, 0.3)';
  minimapCtx.lineWidth = 1;
  connections.forEach(conn => {
    const f = nodes.find(n => n.id === conn.from);
    const t = nodes.find(n => n.id === conn.to);
    if (!f || !t) return;
    minimapCtx.beginPath();
    minimapCtx.moveTo(ox + (f.x + 125 - minX) * scale, oy + (f.y + 60 - minY) * scale);
    minimapCtx.lineTo(ox + (t.x + 125 - minX) * scale, oy + (t.y + 60 - minY) * scale);
    minimapCtx.stroke();
  });

  // Draw nodes
  const colors = {
    strategy: '#8b5cf6',
    project: '#10b981',
    deal: '#3b82f6',
    milestone: '#f59e0b',
    floorplan: '#64748b',
  };
  nodes.forEach(n => {
    minimapCtx.fillStyle = colors[n.type] || '#64748b';
    minimapCtx.globalAlpha = 0.7;
    const nx = ox + (n.x - minX) * scale;
    const ny = oy + (n.y - minY) * scale;
    minimapCtx.fillRect(nx, ny, Math.max(4, 250 * scale), Math.max(3, 80 * scale));
  });
  minimapCtx.globalAlpha = 1;

  // Viewport rect
  const vp = document.getElementById('minimap-viewport');
  const vpLeft = ox + (-panX / zoom - minX) * scale;
  const vpTop = oy + (-panY / zoom - minY) * scale;
  const vpW = (window.innerWidth / zoom) * scale;
  const vpH = (window.innerHeight / zoom) * scale;
  vp.style.left = vpLeft + 'px';
  vp.style.top = vpTop + 'px';
  vp.style.width = vpW + 'px';
  vp.style.height = vpH + 'px';
}

// ─── CONTROLS ───
// Pan
document.getElementById('canvas-container').addEventListener('mousedown', (e) => {
  if (e.target.closest('.canvas-node')) return;
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  document.body.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
  // Update coords
  const wx = ((e.clientX - panX) / zoom).toFixed(0);
  const wy = ((e.clientY - panY) / zoom).toFixed(0);
  coordsEl.textContent = `${wx}, ${wy}`;

  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    updateTransform();
  }

  if (draggingNode) {
    draggingNode.x = (e.clientX - panX) / zoom - dragOffsetX;
    draggingNode.y = (e.clientY - panY) / zoom - dragOffsetY;
    // Snap to grid
    draggingNode.x = Math.round(draggingNode.x / 20) * 20;
    draggingNode.y = Math.round(draggingNode.y / 20) * 20;
    draggingNode.el.style.left = draggingNode.x + 'px';
    draggingNode.el.style.top = draggingNode.y + 'px';
    renderConnections();
    updateMinimap();
  }
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  document.body.classList.remove('dragging');

  if (draggingNode) {
    draggingNode.el.classList.remove('dragging');
    draggingNode = null;
    document.body.classList.remove('node-dragging');
  }

  connectingFrom = null;
});

// Zoom
document.getElementById('canvas-container').addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const oldZoom = zoom;
  zoom = Math.max(0.15, Math.min(3, zoom + delta));

  // Zoom toward cursor
  panX = e.clientX - (e.clientX - panX) * (zoom / oldZoom);
  panY = e.clientY - (e.clientY - panY) * (zoom / oldZoom);

  updateTransform();
}, { passive: false });

function zoomBy(delta) {
  const oldZoom = zoom;
  zoom = Math.max(0.15, Math.min(3, zoom + delta));
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  panX = cx - (cx - panX) * (zoom / oldZoom);
  panY = cy - (cy - panY) * (zoom / oldZoom);
  updateTransform();
}

function resetView() {
  zoom = 1;
  panX = window.innerWidth / 2;
  panY = window.innerHeight / 3;
  updateTransform();
}

function toggleMap() {
  mapVisible = !mapVisible;
  document.getElementById('map-layer').classList.toggle('visible', mapVisible);
  document.getElementById('btn-map').classList.toggle('active', mapVisible);
}

function toggleGrid() {
  gridVisible = !gridVisible;
  document.getElementById('btn-grid').classList.toggle('active', !gridVisible);
  drawGrid();
}

function autoLayout() {
  // Simple force-directed layout
  const strategyNodes = nodes.filter(n => n.type === 'strategy');
  const projectNodes = nodes.filter(n => n.type === 'project');
  const dealNodes = nodes.filter(n => n.type === 'deal');
  const milestoneNodes = nodes.filter(n => n.type === 'milestone');
  const floorplanNodes = nodes.filter(n => n.type === 'floorplan');

  const centerX = 0;
  let y = -300;

  // Row 1: Strategy
  strategyNodes.forEach((n, i) => {
    n.x = centerX - (strategyNodes.length - 1) * 175 + i * 350;
    n.y = y;
  });
  y += 280;

  // Row 2: Projects
  projectNodes.forEach((n, i) => {
    n.x = centerX - (projectNodes.length - 1) * 200 + i * 400;
    n.y = y;
  });
  y += 260;

  // Row 3: Deals
  dealNodes.forEach((n, i) => {
    n.x = centerX - (dealNodes.length - 1) * 190 + i * 380;
    n.y = y;
  });
  y += 240;

  // Row 4: Milestones
  milestoneNodes.forEach((n, i) => {
    n.x = centerX - (milestoneNodes.length - 1) * 175 + i * 350;
    n.y = y;
  });

  // Floor plans off to the right
  floorplanNodes.forEach((n, i) => {
    n.x = 700;
    n.y = -200 + i * 300;
  });

  // Animate
  nodes.forEach(n => {
    n.el.style.transition = 'left 0.5s ease, top 0.5s ease';
    n.el.style.left = n.x + 'px';
    n.el.style.top = n.y + 'px';
    setTimeout(() => { n.el.style.transition = ''; }, 600);
  });

  setTimeout(() => {
    renderConnections();
    updateMinimap();
  }, 550);
}

// ─── KEYBOARD ───
window.addEventListener('keydown', (e) => {
  if (e.key === '0' || (e.key === '0' && e.metaKey)) { resetView(); e.preventDefault(); }
  if (e.key === '=' || e.key === '+') { zoomBy(0.15); e.preventDefault(); }
  if (e.key === '-') { zoomBy(-0.15); e.preventDefault(); }
  if (e.key === 'g') { toggleGrid(); }
  if (e.key === 'm') { toggleMap(); }
});

// ─── RESIZE ───
window.addEventListener('resize', () => {
  resizeGrid();
  drawGrid();
  updateMinimap();
});

// ─── BOOT ───
init();
// Set grid button active by default
document.getElementById('btn-grid').classList.add('active');
</script>
</body>
