<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Measurably Better — Gate</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: #FAFAF8;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .gate {
    text-align: center;
    max-width: 440px;
    padding: 0 24px;
  }

  .wordmark {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(1.75rem, 4vw, 2.25rem);
    color: #1A1A1A;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .hero-line {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.95rem, 2.5vw, 1.125rem);
    color: #6B6B64;
    line-height: 1.6;
    margin-bottom: 48px;
    font-weight: 400;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .gate-input {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    padding: 16px 0;
    border: none;
    border-bottom: 2px solid #E5E5E0;
    background: transparent;
    text-align: center;
    width: 100%;
    outline: none;
    color: #1A1A1A;
    transition: border-color 0.2s ease;
    letter-spacing: 0.01em;
  }

  .gate-input::placeholder {
    color: #B0AFA8;
    font-weight: 400;
  }

  .gate-input:focus {
    border-bottom-color: #B45309;
  }

  .footer {
    margin-top: 56px;
    font-size: 12px;
    color: #B0AFA8;
    letter-spacing: 0.02em;
  }

  .footer a {
    color: #B45309;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="gate">
    <h1 class="wordmark">Measurably Better</h1>
    <p class="hero-line">The South has the culture.<br>We're building the infrastructure to match.</p>
    <div class="input-wrap">
      <input type="text" class="gate-input" placeholder="Enter your name to continue" autofocus>
    </div>
    <p class="footer">
      Hillbilly Dreams, Inc. &middot; Natchez, Mississippi
    </p>
  </div>
</body>
</html>
