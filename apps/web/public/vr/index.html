<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hillbilly Dreams — VR Experience</title>
  <meta name="description" content="A psychedelic VR journey through the Hillbilly Dreams universe">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    .a-enter-vr-button { background: rgba(139, 92, 246, 0.8) !important; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a1a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: 'Georgia', serif; color: #c4a35a; transition: opacity 1s;
    }
    #loading-screen h1 { font-size: 3rem; margin: 0; letter-spacing: 0.2em; }
    #loading-screen p { font-size: 1.2rem; color: #8b7355; margin-top: 1rem; }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>HILLBILLY DREAMS</h1>
    <p class="pulse">Entering the cosmic corridor...</p>
  </div>

  <a-scene vr-mode-ui="enabled: true" loading-screen="enabled: false" renderer="antialias: true; colorManagement: true">
    <a-assets id="assets" timeout="30000"></a-assets>

    <!-- Camera -->
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="enabled: true">
        <a-cursor fuse="true" fuse-timeout="2000" color="#c4a35a"
          animation__fusing="property: scale; startEvents: fusing; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1; easing: easeInCubic"
          animation__leave="property: scale; startEvents: mouseleave; dur: 300; to: 1 1 1"
          raycaster="objects: .clickable"
        ></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Sky (dynamically swapped) -->
    <a-sky id="sky" color="#0a0a1a"></a-sky>

    <!-- Title -->
    <a-entity id="title-group" position="0 3.5 -5">
      <a-text id="title-text" value="HILLBILLY DREAMS" color="#c4a35a" font="kelsonsans" width="12" align="center" opacity="0.9"
        animation="property: position; to: 0 0.2 0; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true"
      ></a-text>
      <a-text id="subtitle-text" value="Choose a Room" color="#8b7355" font="kelsonsans" width="6" align="center" position="0 -0.6 0" opacity="0.7"></a-text>
    </a-entity>

    <!-- Room orbs container (populated dynamically) -->
    <a-entity id="room-orbs"></a-entity>

    <!-- Ambient geometry -->
    <a-torus position="-5 3 -8" color="#7c3aed" radius="0.8" radius-tubular="0.05" opacity="0.3"
      animation="property: rotation; to: 360 360 0; dur: 20000; easing: linear; loop: true"></a-torus>
    <a-torus position="6 4 -6" color="#c4a35a" radius="0.6" radius-tubular="0.04" opacity="0.25"
      animation="property: rotation; to: 0 360 360; dur: 15000; easing: linear; loop: true"></a-torus>
    <a-torus position="0 5 -10" color="#14b8a6" radius="1.2" radius-tubular="0.06" opacity="0.2"
      animation="property: rotation; to: 360 0 360; dur: 25000; easing: linear; loop: true"></a-torus>
    <a-icosahedron position="-4 2.5 -6" color="#c4a35a" radius="0.2" opacity="0.4" metalness="0.9"
      animation="property: rotation; to: 360 360 360; dur: 12000; easing: linear; loop: true"
      animation__float="property: position; to: -4 3 -6; dir: alternate; dur: 4000; easing: easeInOutSine; loop: true"></a-icosahedron>

    <!-- Ground -->
    <a-circle position="0 0 0" rotation="-90 0 0" radius="15" color="#0a0a1a" opacity="0.3"></a-circle>

    <!-- Lighting -->
    <a-light type="ambient" color="#443366" intensity="0.4"></a-light>
    <a-light type="point" color="#c4a35a" intensity="0.6" position="0 4 -3"
      animation="property: intensity; from: 0.4; to: 0.8; dir: alternate; dur: 3000; loop: true"></a-light>
    <a-light type="point" color="#7c3aed" intensity="0.3" position="-3 3 -5"></a-light>
    <a-light type="point" color="#14b8a6" intensity="0.3" position="3 3 -5"></a-light>
  </a-scene>

  <script>
    var rooms = [];
    var currentRoom = null;
    var sky = document.getElementById('sky');
    var assets = document.getElementById('assets');
    var orbContainer = document.getElementById('room-orbs');
    var titleText = document.getElementById('title-text');
    var subtitleText = document.getElementById('subtitle-text');

    // Load rooms from manifest
    fetch('/vr/rooms.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        rooms = data;
        // Pre-load all sky images
        rooms.forEach(function(room) {
          var img = document.createElement('img');
          img.id = 'sky-' + room.id;
          img.src = room.sky;
          img.setAttribute('crossorigin', 'anonymous');
          assets.appendChild(img);
        });
        // Wait for assets then build orbs
        setTimeout(function() {
          buildOrbs();
          // Enter first room
          if (rooms.length > 0) enterRoom(rooms[0].id);
          // Hide loading
          setTimeout(function() {
            document.getElementById('loading-screen').classList.add('fade-out');
            setTimeout(function() {
              document.getElementById('loading-screen').style.display = 'none';
            }, 1000);
          }, 1000);
        }, 1500);
      });

    function buildOrbs() {
      // Arrange orbs in a circle around the user
      var count = rooms.length;
      rooms.forEach(function(room, i) {
        var angle = (i / count) * Math.PI * 2 - Math.PI / 2;
        var radius = 5;
        var x = Math.cos(angle) * radius;
        var z = Math.sin(angle) * radius;
        var floatOffset = (i * 0.3) % 1;

        var orb = document.createElement('a-entity');
        orb.id = 'orb-' + room.id;
        orb.setAttribute('class', 'clickable');
        orb.setAttribute('position', x + ' 1.8 ' + z);
        orb.setAttribute('event-set__mouseenter', 'scale: 1.3 1.3 1.3');
        orb.setAttribute('event-set__mouseleave', 'scale: 1 1 1');
        orb.setAttribute('animation', 'property: position; to: ' + x + ' 2.2 ' + z + '; dir: alternate; dur: ' + (2500 + i * 300) + '; easing: easeInOutSine; loop: true');

        orb.innerHTML =
          '<a-sphere radius="0.3" color="' + room.color + '" opacity="0.7" metalness="0.8" roughness="0.2" ' +
            'animation__glow="property: material.emissive; from: ' + room.glow + '; to: ' + room.color + '; dir: alternate; dur: 1500; loop: true"></a-sphere>' +
          '<a-text value="' + room.name + '" color="' + room.textColor + '" width="3" align="center" position="0 -0.5 0"></a-text>' +
          '<a-ring color="' + room.color + '" radius-inner="0.35" radius-outer="0.45" opacity="0.4" ' +
            'animation="property: rotation; to: 0 360 0; dur: ' + (6000 + i * 1000) + '; easing: linear; loop: true"></a-ring>';

        orb.addEventListener('click', function() { enterRoom(room.id); });
        orbContainer.appendChild(orb);
      });
    }

    function enterRoom(id) {
      if (currentRoom === id) return;
      var room = rooms.find(function(r) { return r.id === id; });
      if (!room) return;

      // Fade out
      sky.setAttribute('animation__fadeout', 'property: material.opacity; from: 1; to: 0; dur: 600');

      setTimeout(function() {
        currentRoom = id;
        sky.setAttribute('src', '#sky-' + id);
        sky.setAttribute('animation__fadein', 'property: material.opacity; from: 0; to: 1; dur: 600');

        titleText.setAttribute('value', room.name.toUpperCase());
        subtitleText.setAttribute('value', room.subtitle);

        // Dim current room's orb, brighten others
        rooms.forEach(function(r) {
          var orb = document.getElementById('orb-' + r.id);
          if (orb) {
            orb.setAttribute('visible', r.id !== id);
          }
        });
      }, 600);
    }
  </script>
</body>
</html>
