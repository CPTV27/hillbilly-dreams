<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Muddy Touring</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');

        .banner {
            width: 100vw;
            height: 220px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f0d 0%, #2a1f14 100%);
            display: flex;
            align-items: center;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(15,15,13,0.85), rgba(15,15,13,0.6) 50%, rgba(15,15,13,0.85));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 0 60px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
            color: #fff;
        }

        .tagline {
            font-size: 18px;
            margin: 0 0 12px 0;
            opacity: 0.95;
        }

        .domain {
            font-size: 15px;
            opacity: 0.75;
            margin: 0;
        }

        .live-badge {
            position: absolute;
            top: 30px;
            right: 60px;
            background: #c8943e;
            color: #0f0f0d;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 30px;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(200, 148, 62, 0.5);
        }
    </style>
</head>
<body style="margin:0;">
    <div class="banner">
        <div class="live-badge">● LIVE</div>
        <div class="content">
            <h1 class="brand-name">BIG MUDDY TOURING</h1>
            <p class="tagline">Gateway to the heart of soul music</p>
            <p class="domain">bigmuddytouring.com</p>
        </div>
    </div>
</body>
</html>
