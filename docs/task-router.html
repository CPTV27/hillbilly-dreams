<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDI — Task Router</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #1A1613; --mud: #3B2F2F; --terra: #B85042; --gold: #C8943E;
  --sand: #E7E8D1; --cream: #F5F0EB; --sage: #A7BEAE; --green: #27AE60;
  --yellow: #F39C12; --red: #C0392B; --mid: #7A7067; --blue: #4A90D9;
  --radius: 6px;
  --shadow-sm: 0 1px 3px rgba(26,22,19,0.06), 0 1px 2px rgba(26,22,19,0.04);
  --shadow-md: 0 4px 16px rgba(26,22,19,0.08), 0 1px 3px rgba(26,22,19,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
body { font-family:'Inter',sans-serif; background:var(--cream); color:var(--dark); line-height:1.6; }

/* Header */
.header { background:var(--dark); padding:1.5rem 2rem; border-bottom:1px solid rgba(200,148,62,0.2); }
.header h1 { font-family:'Playfair Display',Georgia,serif; color:var(--cream); font-size:1.6rem; letter-spacing:-0.02em; }
.header h1 span { color:var(--terra); }
.header .sub { color:var(--mid); font-size:0.8rem; margin-top:0.2rem; }

/* Layout */
.container { max-width:1300px; margin:0 auto; padding:1.5rem; }
.grid { display:grid; grid-template-columns:320px 1fr; gap:1.5rem; }

/* Input panel */
.input-panel { background:white; border-radius:var(--radius); box-shadow:var(--shadow-md); padding:1.5rem; position:sticky; top:1rem; height:fit-content; }
.input-panel h2 { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--dark); margin-bottom:1rem; }
.input-panel label { display:block; font-size:0.75rem; font-weight:600; color:var(--mid); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.3rem; margin-top:1rem; }
.input-panel label:first-of-type { margin-top:0; }
.input-panel textarea, .input-panel input, .input-panel select {
  width:100%; padding:0.7rem 0.9rem; border:1px solid rgba(200,148,62,0.2); border-radius:4px;
  font-family:'Inter',sans-serif; font-size:0.9rem; background:var(--cream); color:var(--dark);
  transition:border-color 0.3s;
}
.input-panel textarea:focus, .input-panel input:focus, .input-panel select:focus { outline:none; border-color:var(--gold); }
.input-panel textarea { min-height:100px; resize:vertical; }
.btn { display:block; width:100%; padding:0.75rem; margin-top:1.2rem; background:var(--terra); color:white; border:none; border-radius:4px; font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:600; cursor:pointer; transition:background 0.2s, transform 0.1s; }
.btn:hover { background:#a04538; }
.btn:active { transform:scale(0.98); }
.btn.secondary { background:var(--dark); margin-top:0.5rem; }

/* Board */
.board { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
.column { background:rgba(200,148,62,0.04); border-radius:var(--radius); padding:0.8rem; min-height:400px; }
.column-header { display:flex; align-items:center; justify-content:space-between; padding:0.6rem 0.8rem; border-radius:4px; margin-bottom:0.8rem; }
.column-header h3 { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
.column-header .count { font-size:0.7rem; font-weight:700; background:rgba(255,255,255,0.3); padding:0.1rem 0.5rem; border-radius:10px; }

.col-inbox .column-header { background:var(--blue); color:white; }
.col-primetime .column-header { background:var(--gold); color:white; }
.col-cursor .column-header { background:var(--sage); color:var(--dark); }
.col-mini .column-header { background:var(--terra); color:white; }

/* Task cards */
.task-card { background:white; border-radius:4px; padding:0.9rem; margin-bottom:0.6rem; box-shadow:var(--shadow-sm); border-left:3px solid var(--mid); cursor:grab; transition:box-shadow 0.2s, transform 0.2s; position:relative; }
.task-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.task-card.p1 { border-left-color:var(--red); }
.task-card.p2 { border-left-color:var(--gold); }
.task-card.p3 { border-left-color:var(--sage); }
.task-card .task-title { font-size:0.85rem; font-weight:600; color:var(--dark); margin-bottom:0.3rem; }
.task-card .task-desc { font-size:0.75rem; color:var(--mid); line-height:1.5; }
.task-card .task-meta { display:flex; gap:0.4rem; margin-top:0.5rem; flex-wrap:wrap; }
.task-card .task-tag { font-size:0.6rem; font-weight:600; padding:0.1rem 0.4rem; border-radius:3px; text-transform:uppercase; letter-spacing:0.04em; }
.task-tag.code { background:rgba(74,144,217,0.12); color:var(--blue); }
.task-tag.content { background:rgba(200,148,62,0.12); color:var(--gold); }
.task-tag.research { background:rgba(167,190,174,0.3); color:#3a6b4a; }
.task-tag.infra { background:rgba(184,80,66,0.12); color:var(--terra); }
.task-tag.design { background:rgba(243,156,18,0.12); color:var(--yellow); }
.task-tag.priority { background:var(--red); color:white; }
.task-tag.this-week { background:var(--gold); color:white; }
.task-tag.backlog { background:var(--mid); color:white; }
.task-card .delete-btn { position:absolute; top:0.5rem; right:0.5rem; background:none; border:none; color:var(--mid); cursor:pointer; font-size:0.8rem; opacity:0; transition:opacity 0.2s; }
.task-card:hover .delete-btn { opacity:1; }

/* Stats bar */
.stats { display:flex; gap:1.5rem; padding:1rem 0; margin-bottom:1rem; border-bottom:1px solid rgba(200,148,62,0.15); }
.stat { text-align:center; }
.stat .num { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:var(--dark); }
.stat .label { font-size:0.7rem; color:var(--mid); text-transform:uppercase; letter-spacing:0.06em; }

/* Responsive */
@media (max-width:1000px) { .grid { grid-template-columns:1fr; } .board { grid-template-columns:repeat(2,1fr); } }
@media (max-width:600px) { .board { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>Task <span>Router</span></h1>
  <div class="sub">Hillbilly Dreams Inc — Agent Task Management</div>
</div>

<div class="container">

<div class="stats" id="stats">
  <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total</div></div>
  <div class="stat"><div class="num" id="stat-p1" style="color:var(--red)">0</div><div class="label">Priority 1</div></div>
  <div class="stat"><div class="num" id="stat-p2" style="color:var(--gold)">0</div><div class="label">This Week</div></div>
  <div class="stat"><div class="num" id="stat-done" style="color:var(--green)">0</div><div class="label">Done</div></div>
</div>

<div class="grid">

<!-- Input Panel -->
<div class="input-panel">
  <h2>New Task</h2>
  <label>What needs to happen?</label>
  <textarea id="task-title" placeholder="Describe the task..."></textarea>

  <label>Type</label>
  <select id="task-type">
    <option value="code">Code / Build</option>
    <option value="content">Content / Copy</option>
    <option value="research">Research</option>
    <option value="infra">Infrastructure</option>
    <option value="design">Design / Visual</option>
  </select>

  <label>Priority</label>
  <select id="task-priority">
    <option value="p1">Do Now</option>
    <option value="p2">This Week</option>
    <option value="p3">Backlog</option>
  </select>

  <label>Route to</label>
  <select id="task-agent">
    <option value="auto">Auto-route</option>
    <option value="primetime">Primetime (Claude Code, MBP)</option>
    <option value="cursor">Cursor (Quick edits)</option>
    <option value="mini">Mac Mini (Broadcasting/Infra)</option>
    <option value="inbox">Inbox (Unassigned)</option>
  </select>

  <button class="btn" onclick="addTask()">Route Task</button>
  <button class="btn secondary" onclick="loadTonight()">Load Tonight's Debt</button>
</div>

<!-- Board -->
<div>
<div class="board" id="board">
  <div class="column col-inbox" id="col-inbox">
    <div class="column-header"><h3>Inbox</h3><span class="count" id="count-inbox">0</span></div>
  </div>
  <div class="column col-primetime" id="col-primetime">
    <div class="column-header"><h3>Primetime</h3><span class="count" id="count-primetime">0</span></div>
  </div>
  <div class="column col-cursor" id="col-cursor">
    <div class="column-header"><h3>Cursor / AG</h3><span class="count" id="count-cursor">0</span></div>
  </div>
  <div class="column col-mini" id="col-mini">
    <div class="column-header"><h3>Mac Mini</h3><span class="count" id="count-mini">0</span></div>
  </div>
</div>
</div>

</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('hdi-tasks') || '[]');

const ROUTING_RULES = {
  code:    { primary: 'primetime', fallback: 'cursor' },
  content: { primary: 'cursor',    fallback: 'primetime' },
  research:{ primary: 'cursor',    fallback: 'inbox' },
  infra:   { primary: 'mini',      fallback: 'primetime' },
  design:  { primary: 'primetime', fallback: 'cursor' },
};

function autoRoute(type) {
  return ROUTING_RULES[type]?.primary || 'inbox';
}

function addTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) return;
  const type = document.getElementById('task-type').value;
  const priority = document.getElementById('task-priority').value;
  let agent = document.getElementById('task-agent').value;
  if (agent === 'auto') agent = autoRoute(type);

  tasks.push({ id: Date.now(), title, type, priority, agent, done: false, created: new Date().toISOString() });
  save();
  render();
  document.getElementById('task-title').value = '';
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function moveTask(id, newAgent) {
  const task = tasks.find(t => t.id === id);
  if (task) { task.agent = newAgent; save(); render(); }
}

function save() {
  localStorage.setItem('hdi-tasks', JSON.stringify(tasks));
}

function render() {
  ['inbox','primetime','cursor','mini'].forEach(col => {
    const el = document.getElementById('col-' + col);
    const header = el.querySelector('.column-header');
    el.innerHTML = '';
    el.appendChild(header);
    const colTasks = tasks.filter(t => t.agent === col && !t.done);
    document.getElementById('count-' + col).textContent = colTasks.length;
    colTasks.forEach(t => {
      const card = document.createElement('div');
      card.className = 'task-card ' + t.priority;
      card.draggable = true;
      card.dataset.id = t.id;
      card.ondragstart = e => e.dataTransfer.setData('text/plain', t.id);

      const priorityLabel = t.priority === 'p1' ? 'Do Now' : t.priority === 'p2' ? 'This Week' : 'Backlog';
      const priorityClass = t.priority === 'p1' ? 'priority' : t.priority === 'p2' ? 'this-week' : 'backlog';

      card.innerHTML = `
        <button class="delete-btn" onclick="deleteTask(${t.id})">&times;</button>
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span class="task-tag ${t.type}">${t.type}</span>
          <span class="task-tag ${priorityClass}">${priorityLabel}</span>
        </div>
      `;
      el.appendChild(card);
    });
  });

  // Stats
  document.getElementById('stat-total').textContent = tasks.filter(t => !t.done).length;
  document.getElementById('stat-p1').textContent = tasks.filter(t => t.priority === 'p1' && !t.done).length;
  document.getElementById('stat-p2').textContent = tasks.filter(t => t.priority === 'p2' && !t.done).length;
  document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;
}

// Drag and drop
document.querySelectorAll('.column').forEach(col => {
  col.ondragover = e => { e.preventDefault(); col.style.background = 'rgba(200,148,62,0.1)'; };
  col.ondragleave = () => { col.style.background = ''; };
  col.ondrop = e => {
    e.preventDefault();
    col.style.background = '';
    const id = parseInt(e.dataTransfer.getData('text/plain'));
    const agent = col.id.replace('col-', '');
    moveTask(id, agent);
  };
});

function loadTonight() {
  const tonight = [
    { title: "Micromedia site: show actual stack + roadmap, not research catalog", type: "code", priority: "p1", agent: "primetime" },
    { title: "Business review site: integrate 13 presentation notes", type: "code", priority: "p1", agent: "primetime" },
    { title: "Update BUSINESS_ARCHITECTURE.md with 19 decisions", type: "content", priority: "p2", agent: "cursor" },
    { title: "Update BIG_MUDDY_MEDIA_PLAYBOOK.md (Tracy editor, Magazine→Inn)", type: "content", priority: "p2", agent: "cursor" },
    { title: "Voice memo pipeline: batch transcribe 209 memos with Whisper", type: "infra", priority: "p2", agent: "mini" },
    { title: "ElevenLabs voice clone from Chase's voice memos", type: "code", priority: "p2", agent: "primetime" },
    { title: "Artist subscription Stripe products ($99/$250/$500)", type: "code", priority: "p2", agent: "primetime" },
    { title: "Tracy voice profile questionnaire", type: "code", priority: "p2", agent: "cursor" },
    { title: "Reconcile 3 pricing frameworks into one coherent system", type: "content", priority: "p1", agent: "inbox" },
    { title: "Touring page redesign: bands / venues / fans sections", type: "code", priority: "p2", agent: "primetime" },
    { title: "Records + Radio unified public page", type: "code", priority: "p2", agent: "primetime" },
    { title: "Magazine copy: reposition as Inn marketing channel", type: "content", priority: "p2", agent: "cursor" },
    { title: "Production request → Asana task pipeline", type: "code", priority: "p2", agent: "primetime" },
    { title: "Build influencer database model", type: "code", priority: "p3", agent: "cursor" },
    { title: "RSS feed ingestion system for script generation", type: "code", priority: "p3", agent: "primetime" },
    { title: "Animated explainer video brief (Tracy + Delta Dawn)", type: "design", priority: "p3", agent: "cursor" },
    { title: "Musician community platform spec (Deep South MySpace)", type: "research", priority: "p3", agent: "cursor" },
    { title: "AzuraCast evaluation (parallel test, don't replace OB yet)", type: "infra", priority: "p3", agent: "mini" },
    { title: "Agent task router: proper API endpoint or n8n workflow", type: "code", priority: "p2", agent: "primetime" },
    { title: "Land & Expand: phased cost breakdown + site plan rendering", type: "design", priority: "p3", agent: "cursor" },
    { title: "Born Free hardware BOM + software image spec", type: "research", priority: "p3", agent: "mini" },
    { title: "Google compliance scoring agent", type: "code", priority: "p3", agent: "primetime" },
    { title: "Public access integration module spec", type: "research", priority: "p3", agent: "cursor" },
  ];

  // Don't duplicate
  const existingTitles = new Set(tasks.map(t => t.title));
  let added = 0;
  tonight.forEach(t => {
    if (!existingTitles.has(t.title)) {
      tasks.push({ ...t, id: Date.now() + Math.random() * 1000, done: false, created: new Date().toISOString() });
      added++;
    }
  });
  save();
  render();
  alert(added + ' tasks loaded from tonight\'s session.');
}

// Init
render();
</script>
</body>
</html>
