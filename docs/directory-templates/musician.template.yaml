  is_heritage: null                           # true for historic figures
  birth_year: ""
  death_year: ""
  peak_era: ""                                # "Mid-1950s Chess Records era"
  home_venue: ""                              # Historically associated venue
  estate_contact: ""                          # For deceased artists
  foundation: ""                              # If a foundation manages their legacy

# --- OUR RELATIONSHIP ---
