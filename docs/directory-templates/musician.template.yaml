last_contacted: ""
last_booked: ""
submitted_music: null                         # true/false (for radio rotation)
on_big_muddy_records: null                    # true/false
has_catalog_profile: null                     # true/false (musician has a Catalog profile)
notes: |
  Free-form. How's it going to work with them? Any context?

